<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Constellation 25</title>
<style>body{font-family:system-ui;background:#0a0a0a;color:#fff;padding:2rem}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:1rem}.card{padding:1rem;background:#1a1a1a;border-radius:8px}</style></head><body>
<h1>🌌 Constellation 25</h1><p>Big Tree • 1 repo • 1 push • Plan 52f7b763</p>
<div class="grid" id="g"></div>
<script>fetch('/packages.json').then(r=>r.json()).then(p=>{const g=document.getElementById('g');p.forEach(x=>{const c=document.createElement('div');c.className='card';c.innerHTML='<h3>'+x.name+'</h3><small>'+x.path+'</small>';g.appendChild(c)})})</script>
</body></html>
