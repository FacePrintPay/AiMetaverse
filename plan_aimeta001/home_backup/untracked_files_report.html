  <style>
    :root { font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, Cantarell, "Noto Sans", Arial; }
    body { margin: 0; padding: 24px; background: #0b0f14; color: #e6edf3; }
    h1 { margin: 0 0 8px; font-size: 20px; }
    .sub { margin: 0 0 18px; color: #9fb0c0; font-size: 13px; line-height: 1.4; }
    .bar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin: 12px 0 16px; }
    input[type="search"]{
      flex: 1;
      min-width: 220px;
      padding: 10px 12px;
      border: 1px solid #223044;
      background: #0f1621;
      color: #e6edf3;
      border-radius: 10px;
      outline: none;
    }
    button{
      padding: 10px 12px;
      border: 1px solid #223044;
      background: #111a26;
      color: #e6edf3;
      border-radius: 10px;
      cursor: pointer;
    }
    button:hover{ background:#162235; }
    .meta { display:flex; gap: 12px; flex-wrap: wrap; color:#9fb0c0; font-size: 12px; }
    .card {
      border: 1px solid #223044;
      background: #0f1621;
      border-radius: 14px;
      overflow: hidden;
    }
    .cardhead{
      display:flex;
      justify-content: space-between;
      align-items:center;
      gap: 10px;
      padding: 10px 12px;
      border-bottom: 1px solid #223044;
      background: #0d131c;
    }
    .tag { font-size: 12px; color:#9fb0c0; }
    pre {
      margin: 0;
      padding: 12px;
      overflow: auto;
      white-space: pre;
      font-size: 12px;
      line-height: 1.45;
    }
    .muted { color:#9fb0c0; }
    .list { margin-top: 14px; }
    .row { display:flex; gap: 10px; align-items: baseline; padding: 8px 12px; border-top: 1px solid #162235; }
    .row:first-child { border-top: none; }
    .path { flex: 1; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; font-size: 12px; }
    .pill { font-size: 11px; color:#0b0f14; background:#9fb0c0; padding: 2px 8px; border-radius: 999px; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <h1>Untracked Files Report</h1>
  <p class="sub">
    Snapshot of <span class="muted">git status</span> untracked output. Use search to filter, copy to clipboard, or export the filtered list.
  </p>

  <div class="bar">
    <input id="q" type="search" placeholder="Filter (e.g. .env, TotalRecall, node_modules, .key, agentik)..." />
    <button id="copyAll">Copy all</button>
    <button id="copyFiltered">Copy filtered</button>
    <button id="exportFiltered">Export filtered .txt</button>
  </div>

  <div class="meta">
    <div>Total items: <span id="total">0</span></div>
    <div>Showing: <span id="shown">0</span></div>
    <div>Generated: <span id="gen"></span></div>
  </div>

  <div class="card" style="margin-top:14px;">
    <div class="cardhead">
      <div class="tag">Raw input</div>
      <button id="toggleRaw">Hide raw</button>
    </div>
    <pre id="raw"></pre>
  </div>

  <div class="card list" style="margin-top:14px;">
    <div class="cardhead">
      <div class="tag">Parsed paths</div>
      <div class="tag">Tip: click a line to copy that single path</div>
    </div>
    <div id="rows"></div>

  const rawEl = document.getElementById("raw");
  const rowsEl = document.getElementById("rows");
  const qEl = document.getElementById("q");
  const totalEl = document.getElementById("total");
  const shownEl = document.getElementById("shown");
  const genEl = document.getElementById("gen");
  const toggleRawBtn = document.getElementById("toggleRaw");

  // Render raw
  rawEl.textContent = RAW_TEXT;

  // Parse: grab tokens that look like paths beginning with ../ or ./
  const paths = Array.from(
    new Set(
      RAW_TEXT
        .split(/\s+/g)
        .map(s => s.trim())
        .filter(s => s.startsWith("../") || s.startsWith("./"))
    )
  ).sort((a,b) => a.localeCompare(b));

  totalEl.textContent = String(paths.length);
  genEl.textContent = new Date().toLocaleString();

  function copyText(text){
    if (navigator.clipboard && window.isSecureContext) {
      return navigator.clipboard.writeText(text);
    }
    // fallback
    const ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.left = "-9999px";
    document.body.appendChild(ta);
    ta.select();
    document.execCommand("copy");
    document.body.removeChild(ta);
    return Promise.resolve();
  }

  function render(filter=""){
    rowsEl.innerHTML = "";
    const f = filter.trim().toLowerCase();

    const filtered = paths.filter(p => !f || p.toLowerCase().includes(f));
    shownEl.textContent = String(filtered.length);

    filtered.forEach((p) => {
      const row = document.createElement("div");
      row.className = "row";
      row.title = "Click to copy this path";

      const path = document.createElement("div");
      path.className = "path";
      path.textContent = p;

      const pill = document.createElement("div");
      pill.className = "pill";
      pill.textContent = p.endsWith("/") ? "dir" : "file";

      row.appendChild(path);
      row.appendChild(pill);

      row.addEventListener("click", async () => {
        await copyText(p);
        pill.textContent = "copied";
        setTimeout(() => pill.textContent = (p.endsWith("/") ? "dir" : "file"), 700);
      });

      rowsEl.appendChild(row);
    });

    // store last filtered for export/copy
    window.__AGENTIK_FILTERED = filtered;
  }

  render("");

    a.download = "untracked_files_filtered.txt";
    a.click();
    URL.revokeObjectURL(a.href);
  });
